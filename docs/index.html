<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新規事業立ち上げSLG 縦スライス v0.7</title>
    <style>
      /* アートUIUXコンセプト：ダーク基調・CA=緑 / PA=紫 */
      :root {
        --bg: #0e1116;
        --panel: #161b22;
        --panel2: #1c232d;
        --border: #2a323d;
        --text: #e6edf3;
        --muted: #8b949e;
        --ca: #3fb950; /* CA=緑 */
        --pa: #a371f7; /* PA=紫 */
        --accent: #388bfd;
        --warn: #f85149;
        --amber: #f5a524;
        --teal: #12a594;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, system-ui, sans-serif;
        font-size: 14px;
        font-variant-numeric: tabular-nums; /* FM流：桁を揃える等幅数字 */
      }
      #app { max-width: 1280px; margin: 0 auto; padding: 0 16px 24px; }
      header h1 { font-size: 20px; margin: 0 0 4px; }
      .tag {
        font-size: 11px; color: var(--accent); border: 1px solid var(--accent);
        border-radius: 4px; padding: 1px 6px; vertical-align: middle; margin-left: 8px;
      }
      .sub { color: var(--muted); margin-bottom: 16px; }
      /* ===== FM風トップバー（グローバルHUD・固定）＋タブバー ===== */
      .topbar {
        position: sticky; top: 0; z-index: 40;
        display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        background: linear-gradient(180deg, #10161f, var(--bg));
        border-bottom: 1px solid var(--border); padding: 8px 4px; margin: 0 -16px;
        padding-left: 20px; padding-right: 20px;
      }
      .tb-brand .tb-co { font-weight: 700; font-size: 15px; }
      .tb-brand .tb-sub { color: var(--muted); font-size: 11px; }
      .tb-stats { display: flex; gap: 14px; flex-wrap: wrap; flex: 1; }
      .tb-stat { display: flex; flex-direction: column; line-height: 1.15; }
      .tb-stat .k { color: var(--muted); font-size: 10px; }
      .tb-stat .v { font-size: 15px; font-weight: 700; }
      .tb-stat.danger .v { color: var(--warn); }
      .tb-stat .v.thxp, .kpi .v.thxp { color: var(--teal); }
      .ap-dots { color: var(--accent); letter-spacing: 1px; font-size: 13px; }
      .tb-actions { display: flex; gap: 6px; }
      .tb-actions button { padding: 8px 12px; font-size: 13px; }
      .tb-actions .ghost { padding: 8px 10px; }
      button.primary { background: var(--accent); }
      .tabbar {
        position: sticky; top: 52px; z-index: 39;
        display: flex; gap: 2px; align-items: center; flex-wrap: wrap;
        background: var(--bg); border-bottom: 1px solid var(--border);
        margin: 0 -16px 16px; padding: 0 20px;
      }
      .tab {
        background: transparent; color: var(--muted); border: none; border-bottom: 2px solid transparent;
        border-radius: 0; padding: 10px 16px; font-size: 13px; font-weight: 600;
      }
      .tab:hover { color: var(--text); filter: none; }
      .tab.active { color: var(--text); border-bottom-color: var(--accent); }
      .badge { background: var(--warn); color: #fff; border-radius: 8px; font-size: 10px; padding: 0 5px; }
      .badge.dot { display: inline-block; width: 7px; height: 7px; padding: 0; border-radius: 50%; background: var(--amber); }
      .tabview { min-height: 60vh; }
      /* アラート（概要タブ） */
      .alerts { display: flex; flex-direction: column; gap: 6px; }
      .alert { font-size: 13px; padding: 6px 10px; background: var(--panel2); border-radius: 6px; border-left: 3px solid var(--accent); }
      /* 財務内訳 */
      .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 720px) { .fin-grid { grid-template-columns: 1fr; } }
      .fin-col h4 { margin: 0 0 6px; font-size: 12px; color: var(--muted); }
      .fin-total td { font-weight: 700; border-top: 1px solid var(--border); }
      td.good, .good { color: var(--ca); }
      td.danger, .danger.fin-total td { color: var(--warn); }
      .kpis {
        display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-bottom: 16px;
      }
      .kpi {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 10px;
      }
      .kpi .k { color: var(--muted); font-size: 11px; }
      .kpi .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
      .kpi.warn { border-color: var(--warn); }
      .kpi.warn .v { color: var(--warn); }
      .controls { display: flex; gap: 10px; margin-bottom: 16px; }
      button {
        background: var(--accent); color: #fff; border: none; border-radius: 6px;
        padding: 10px 18px; font-size: 14px; cursor: pointer; font-weight: 600;
      }
      button:hover { filter: brightness(1.1); }
      button.secondary { background: var(--panel2); border: 1px solid var(--border); }
      button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(4,1fr); } }
      .panel {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 14px; margin-bottom: 16px;
      }
      .panel h2 { font-size: 14px; margin: 0 0 10px; }
      .legend { font-weight: 400; color: var(--muted); font-size: 11px; margin-left: 8px; }
      .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin: 0 3px 0 8px; vertical-align: middle; }
      .legend i.ca { background: var(--ca); }
      .legend i.pa { background: var(--pa); }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-size: 11px; font-weight: 600; }
      td.num { text-align: right; font-variant-numeric: tabular-nums; }
      td.ca { color: var(--ca); font-weight: 700; }
      td.pa { color: var(--pa); font-weight: 700; }
      td.job, td.ctry { color: var(--muted); }
      td .ca, span.ca { color: var(--ca); font-weight: 700; }
      td .pa, span.pa { color: var(--pa); font-weight: 700; }
      .stars { color: #d9a441; letter-spacing: 1px; }
      /* 段階開示：ぼやけ表現（level1レンジ）／不明（level0） */
      .blur { filter: blur(0.4px); opacity: 0.7; font-style: italic; }
      .unknown { color: #4d5661; }
      .done { color: var(--muted); font-size: 11px; }
      /* 国別スカウトサブスク（v0.10） */
      .ctabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 12px; }
      .ctab { background: var(--panel2); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 13px; }
      .ctab.active { color: var(--fg, #e8edf2); border-color: var(--accent, #4a9); background: rgba(74,153,153,0.12); }
      .sub-on { color: #4bbf73; font-size: 11px; font-weight: 700; }
      .sub-off { color: #b26b6b; font-size: 11px; }
      .sub-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; font-size: 12px; }
      .sub-locked { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 22px; background: var(--panel2); border: 1px dashed var(--border); border-radius: 10px; }
      .sub-locked .lock-ic { font-size: 30px; }
      button.primary { background: var(--accent, #2f7d7d); color: #fff; border: none; border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 13px; }
      button.primary:hover { filter: brightness(1.1); }
      .mini.ghost { background: transparent; }
      /* リクルート（v0.11：オファー3ターン／全候補表示） */
      .mini.offer { background: rgba(74,153,153,0.18); border-color: var(--accent, #4a9); }
      .negotiating { color: #d9a441; font-size: 11px; text-align: center; display: inline-block; line-height: 1.3; }
      .pending-bar { margin: 8px 0; padding: 7px 10px; background: rgba(217,164,65,0.12); border: 1px solid rgba(217,164,65,0.4); border-radius: 8px; font-size: 12px; color: #d9a441; }
      .recruit-ctl { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin: 8px 0; font-size: 12px; }
      .recruit-ctl select { background: var(--panel2); color: inherit; border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; }
      .pager { display: flex; align-items: center; gap: 8px; margin-left: auto; }
      .pager button[disabled] { opacity: 0.4; cursor: default; }
      /* 他企業タブ（v0.12） */
      .rgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
      .rcard { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
      .rc-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 6px; }
      .rc-share { margin-bottom: 8px; }
      .rc-pct { font-size: 22px; font-weight: 700; color: #6cc6c6; }
      .rc-tiers { display: flex; flex-direction: column; gap: 3px; font-size: 12px; margin-bottom: 8px; }
      .rc-mv { display: flex; flex-wrap: wrap; gap: 4px; min-height: 20px; }
      .mv { font-size: 10px; padding: 1px 6px; border-radius: 10px; border: 1px solid var(--border); }
      .mv.new { color: #6cc6c6; border-color: #6cc6c6; }
      .mv.up { color: #4bbf73; border-color: #4bbf73; }
      .mv.down { color: #d98a8a; border-color: #d98a8a; }
      .mv.aggr { color: #d9a441; border-color: #d9a441; }
      .rfog { margin-top: 12px; padding: 10px; background: var(--panel2); border: 1px dashed var(--border); border-radius: 8px; font-size: 12px; color: var(--muted); }
      .trychild { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; margin-top: 6px; cursor: pointer; }
      .trychild input { width: 16px; height: 16px; }
      .succ-card { border-color: #d9a441; box-shadow: 0 0 0 1px rgba(217,164,65,0.4) inset; }
      /* 表内ミニボタン */
      td.acts { white-space: nowrap; }
      button.mini {
        background: var(--panel2); border: 1px solid var(--border); color: var(--text);
        border-radius: 5px; padding: 4px 8px; font-size: 11px; margin: 0 2px; cursor: pointer;
        line-height: 1.2; text-align: center;
      }
      button.mini:hover { border-color: var(--accent); }
      button.mini.hire { background: rgba(63,185,80,0.12); border-color: var(--ca); }
      button.mini .cost { color: var(--muted); font-size: 10px; }
      select {
        background: var(--panel2); color: var(--text); border: 1px solid var(--border);
        border-radius: 5px; padding: 4px 6px; font-size: 12px;
      }
      .toast { color: var(--accent); font-size: 13px; align-self: center; margin-left: 8px; }
      /* 研究＆青写真ツリー */
      .research-bar { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 12px; padding: 10px; background: var(--panel2); border-radius: 6px; }
      .rb-item { font-size: 12px; color: var(--muted); }
      .rb-item b { color: var(--text); font-size: 15px; }
      .bp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
      .bp-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: var(--panel2); }
      .bp-card .bp-head { font-size: 13px; margin-bottom: 4px; }
      .bp-card .bp-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
      .bp-tag { font-size: 10px; color: #f0a35e; border: 1px solid #f0a35e; border-radius: 3px; padding: 0 4px; }
      .bp-state { font-size: 12px; color: var(--muted); }
      .bp-done { border-color: var(--ca); background: rgba(63,185,80,0.10); }
      .bp-done .bp-head { color: var(--ca); }
      .bp-ok { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
      .bp-lock { opacity: 0.6; }
      .bp-conflict { opacity: 0.55; border-style: dashed; border-color: var(--warn); }
      /* 青写真tier連鎖（ブランチ） */
      .branch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
      .branch { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; background: var(--panel2); }
      .branch-h { font-size: 12px; margin-bottom: 6px; }
      .branch-chips { display: flex; gap: 6px; }
      .bp-chip { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 5px; text-align: center; font-size: 11px; }
      .bp-chip-h { font-size: 10px; margin-bottom: 3px; }
      .bp-chip .bp-state { font-size: 10px; }
      .hot { color: var(--warn); font-weight: 700; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .sub2 { font-size: 11px; color: var(--muted); }
      /* 市場シェアバー（sticky=緑実線 / paid=淡色）＋天井マーカー */
      .share-bar { margin: 10px 0 6px; }
      .sb-track { position: relative; height: 16px; background: var(--panel2); border-radius: 4px; overflow: hidden; display: flex; }
      .sb-sticky { height: 100%; background: var(--ca); }
      .sb-paid { height: 100%; background: rgba(63,185,80,0.35); }
      .sb-cap { position: absolute; top: -2px; width: 2px; height: 20px; }

      .sb-cap.reach { background: var(--accent); opacity: 0.7; }
      .sb-legend { font-size: 11px; color: var(--muted); margin-top: 4px; }
      .sb-legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin: 0 3px 0 8px; vertical-align: middle; }
      .sb-legend i.l-sticky { background: var(--ca); }
      .sb-legend i.l-paid { background: rgba(63,185,80,0.35); }

      .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 6px; }
      .ch { border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: var(--panel2); }
      .ch-h { font-size: 13px; margin-bottom: 4px; }
      .ch-n { font-size: 11px; color: var(--muted); line-height: 1.4; }
      .rivals { font-size: 11px; color: var(--muted); margin-top: 10px; }
      /* 製品カード */
      .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
      .prod-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; background: var(--panel2); }

      .pch { font-size: 11px; color: var(--muted); white-space: nowrap; }
      button.mini.xs { padding: 1px 6px; font-size: 11px; }
      /* 市場グリッド */
      tr.mkt-dormant { opacity: 0.4; }
      /* 氏名クリック */
      a.pname { color: var(--text); text-decoration: underline dotted; cursor: pointer; }

      .ach { display: flex; gap: 8px; align-items: center; padding: 8px; border: 1px solid var(--border); border-radius: 6px; opacity: 0.5; }

      .ach-i { font-size: 18px; }
      .ach-t { display: flex; flex-direction: column; }
      .ach-t small { color: var(--muted); font-size: 11px; }

      .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }

      .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
      /* 新規開始：業態選択カード（v0.8） */
      .arch-choices { display: flex; gap: 14px; margin-top: 14px; flex-wrap: wrap; }
      .arch-card { flex: 1 1 260px; text-align: left; background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; color: inherit; transition: border-color .12s, transform .12s; }
      .arch-card:hover { border-color: var(--accent, #4a9); transform: translateY(-2px); }
      .arch-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
      .arch-sub { font-size: 12px; margin-bottom: 8px; }
      .arch-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
      .modal .muted, .muted { color: var(--muted); font-size: 12px; }
      .d-kpis { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 12px; font-size: 13px; }
      .d-note { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
      .d-list .d-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
      .d-acts { display: flex; gap: 8px; margin-top: 10px; }
      /* 能力バー */
      .ab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
      .ab-cat h4 { margin: 0 0 6px; font-size: 12px; color: var(--muted); }
      .ab { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 12px; position: relative; }
      .ab-l { width: 128px; color: var(--muted); }
      .ab-track { flex: 1; height: 8px; background: var(--panel2); border-radius: 4px; overflow: hidden; }
      .ab-fill { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--ca)); }
      .ab-v { width: 20px; text-align: right; font-variant-numeric: tabular-nums; }
      /* ホバー独自ツールチップ（実数値・v0.19）。ネイティブtitleの遅延/非表示を回避 */
      .ab:hover::after { content: attr(data-exact); position: absolute; right: 28px; top: -4px;
        background: #0b0e13; color: #fff; border: 1px solid var(--border); border-radius: 5px;
        padding: 2px 8px; font-size: 11px; white-space: nowrap; z-index: 100; pointer-events: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
      /* ゲームオーバー */
      .modal.over { text-align: center; max-width: 460px; }
      .modal.over h2 { color: var(--warn); }
      .over-stats { display: grid; gap: 6px; margin: 14px 0; font-size: 14px; }
      .over-ach { color: #d9a441; font-size: 13px; margin-bottom: 14px; }
      .log .loglines { max-height: 200px; overflow-y: auto; }
      .log .line { padding: 4px 0; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 13px; }
